<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bhutan Map</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background:#f5f5f5;
}

h1{
    margin-top:20px;
}

.map-container{
    width:90%;
    max-width:900px;
    margin:auto;
    margin-top:20px;
}

iframe{
    width:100%;
    height:500px;
    border:0;
}
</style>
</head>

<body>

<h1>Map of Bhutan</h1>
<p>Location view from Google Maps</p>

<div class="map-container">
<iframe 
src="https://www.google.com/maps?q=Bhutan&output=embed"
loading="lazy"
allowfullscreen>
</iframe>
</div>

</body>
</html>
